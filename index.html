<!DOCTYPE html>
<html>
<head>
    <title>Zodiac Cipher Geocache</title>
    <style>
        body {
            font-family: monospace;
            text-align: center;
            background: #111;
            color: #eee;
            margin-top: 40px;
        }
        .container {
            background: #222;
            padding: 40px;
            border-radius: 15px;
            display: inline-block;
            max-width: 800px;
        }
        input {
            padding: 10px;
            font-size: 16px;
            width: 220px;
            margin-top: 10px;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            margin-left: 10px;
            cursor: pointer;
            margin-top: 10px;
        }
        h1 { color: #00ffcc; }
        #password { font-size: 2em; color: #ffcc00; margin-top: 15px; }
        #coordinates { 
            margin-top: 20px; 
            font-size: 1.5em; 
            color: #00ff99;
            font-weight: bold;
        }
        #feedback { font-size: 1.2em; margin-top: 15px; }
        #cipher {
            font-size: 1.3em; 
            line-height: 1.6em; 
            text-align: left;
            margin: 20px auto;
            background: #111;
            padding: 15px;
            border-radius: 10px;
            width: fit-content;
        }
        .line { display: block; }
    </style>
</head>
<body>
<div class="container">
    <h1>Zodiac Cipher Challenge</h1>
    <p>Decode the symbols below to find today's password:</p>

    <div id="cipher">
        <span class="line">🌀 ✉️ 🔺 🌊 🍎 🔑 🌀 🔺 ✉️ 🌊</span>
        <span class="line">🔑 🌀 🌊 🔺 ✉️ 🍎 🔑 🔺 🌊 🌀</span>
        <span class="line">🌊 🔑 ✉️ 🍎 🔺 🔑 🌀 ✉️ 🌊 🔺</span>
        <span class="line">🍎 🔑 🌀 🌊 🔺 ✉️ 🔑 🍎 🌊 ✉️</span>
        <span class="line">🌀 🔑 🔺 🌊 🍎 🔑 ✉️ 🌀 🔺 🌊</span>
        <span class="line">✉️ 🔑 🍎 🌊 🔺 🌀 ✉️ 🔑 🌊 🍎</span>
        <span class="line">🔺 🌀 ✉️ 🌊 🔑 🍎 🔺 🔑 🌀 ✉️</span>
        <span class="line">🌊 🔑 🍎 🔺 🔑 🌀 ✉️ 🌊 🍎 🔑</span>
    </div>

    <p>Enter the password once you’ve decoded it:</p>
    <input type="text" id="passwordInput" placeholder="Enter password">
    <button onclick="checkPassword()">Unlock</button>

    <p id="feedback"></p>
    <p id="password"></p>
    <p id="coordinates"></p>
</div>

<script>
// --- Correct solution ---
const correctPassword = "GEOCACHE";

// --- Check password function ---
function checkPassword() {
    const input = document.getElementById("passwordInput").value.trim().toUpperCase();
    const feedback = document.getElementById("feedback");
    const passwordEl = document.getElementById("password");
    const coordsEl = document.getElementById("coordinates");

    if (input === correctPassword) {
        feedback.innerText = "Congratulations!";
        passwordEl.innerText = `Today's password is: ${correctPassword}`;
        coordsEl.innerText = "1-10-Patricks-hidden-place";
    } else {
        feedback.innerText = "You are invaluable";
        passwordEl.innerText = "";
        coordsEl.innerText = "";
    }
}

// --- Console hint for players ---
console.log("Hint: Some symbols repeat. Recognize the patterns to decode 'GEOCACHE'.");
console.log("There are 8 letters in the password. Pattern recognition is key.");
</script>
</body>
</html>
