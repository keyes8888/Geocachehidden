<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Daily Vigenère Puzzle</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      text-align: center;
      padding: 40px;
    }
    .container {
      max-width: 600px;
      margin: auto;
    }
    .cipher-box {
      background: #1e293b;
      padding: 15px;
      margin: 20px 0;
      border-radius: 10px;
    }
    input {
      padding: 10px;
      width: 70%;
      margin-top: 10px;
    }
    button {
      padding: 10px 20px;
      margin-top: 10px;
      cursor: pointer;
    }
    #result {
      margin-top: 20px;
      font-weight: bold;
    }
  </style>
</head>
<body>

<div class="container">
  <h1>🔐 Daily Cipher Puzzle</h1>

  <p id="day"></p>

  <div class="cipher-box">
    <p><strong>Ciphertext:</strong></p>
    <code id="cipher"></code>
  </div>

  <p id="hint"></p>

  <input type="text" id="answerInput" placeholder="Enter your decrypted text...">
  <button onclick="checkAnswer()">Submit</button>

  <p id="result"></p>
</div>

<script>
  // Fixed ciphertext (same for all days)
  const cipherText = "ZICVTWQNGRZGVTWAVZHCQYGLMGJ";

  // Keys for each day (Tuesday fixed)
  const keys = {
    0: "VOID",    // Sunday
    1: "ORBIT",   // Monday
    2: "SHADOW",  // Tuesday (fixed)
    3: "NEBULA",  // Wednesday
    4: "MIRAGE",  // Thursday
    5: "PHANTOM", // Friday
    6: "ENIGMA"   // Saturday
  };

  // Hints for each day
  const hints = {
    0: "Absence reveals truth.",
    1: "Everything revolves.",
    2: "Darkness hides repetition.",
    3: "Clarity emerges from chaos.",
    4: "What you see may not be real.",
    5: "The unseen influences all.",
    6: "Machines once solved this."
  };

  // Determine today's puzzle
  const today = new Date().getDay();
  const key = keys[today];
  const hint = hints[today];

  // Display hint and ciphertext
  document.getElementById("day").innerText = "Today's Key Hint: " + hint;
  document.getElementById("cipher").innerText = cipherText;

  // Vigenère decryption function
  function vigenereDecrypt(cipher, key) {
    cipher = cipher.toUpperCase();
    key = key.toUpperCase();
    let plain = "";
    for (let i = 0, j = 0; i < cipher.length; i++) {
      const c = cipher.charCodeAt(i);
      if (c >= 65 && c <= 90) {
        const k = key.charCodeAt(j % key.length) - 65;
        const p = (c - 65 - k + 26) % 26;
        plain += String.fromCharCode(p + 65);
        j++;
      } else {
        plain += cipher[i];
      }
    }
    return plain;
  }

  // Check user input against decrypted answer
  function checkAnswer() {
    const input = document.getElementById("answerInput").value.toUpperCase().replace(/\s/g,"");
    const decrypted = vigenereDecrypt(cipherText, key).toUpperCase().replace(/\s/g,"");
    if (input === decrypted) {
      document.getElementById("result").innerText = `✅ Correct! Decrypted using key: ${key}`;
      document.getElementById("result").style.color = "lightgreen";
    } else {
      document.getElementById("result").innerText = "❌ Incorrect. Try again.";
      document.getElementById("result").style.color = "red";
    }
  }
</script>

</body>
</html>
