<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Daily Vigenère Puzzle</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      text-align: center;
      padding: 40px;
    }
    .container {
      max-width: 600px;
      margin: auto;
    }
    .cipher-box {
      background: #1e293b;
      padding: 15px;
      margin: 20px 0;
      border-radius: 10px;
    }
    input {
      padding: 10px;
      width: 70%;
      margin-top: 10px;
    }
    button {
      padding: 10px 20px;
      margin-top: 10px;
      cursor: pointer;
    }
    #result {
      margin-top: 20px;
      font-weight: bold;
    }
  </style>
</head>
<body>

<div class="container">
  <h1>🔐 Daily Vigenère Puzzle</h1>

  <p id="day"></p>

  <div class="cipher-box">
    <p><strong>Ciphertext:</strong></p>
    <code id="cipher"></code>
  </div>

  <p id="hint"></p>

  <input type="text" id="answerInput" placeholder="Enter your decrypted text...">
  <button onclick="checkAnswer()">Submit</button>

  <p id="result"></p>
</div>

<script>
  // Vigenère encryption function
  function vigenereEncrypt(plain, key) {
    plain = plain.toUpperCase().replace(/\s/g,"");
    key = key.toUpperCase();
    let cipher = "";
    for (let i = 0, j = 0; i < plain.length; i++) {
      const c = plain.charCodeAt(i);
      if (c >= 65 && c <= 90) {
        const k = key.charCodeAt(j % key.length) - 65;
        const p = (c - 65 + k) % 26;
        cipher += String.fromCharCode(p + 65);
        j++;
      } else {
        cipher += plain[i];
      }
    }
    return cipher;
  }

  // Vigenère decryption function
  function vigenereDecrypt(cipher, key) {
    cipher = cipher.toUpperCase();
    key = key.toUpperCase();
    let plain = "";
    for (let i = 0, j = 0; i < cipher.length; i++) {
      const c = cipher.charCodeAt(i);
      if (c >= 65 && c <= 90) {
        const k = key.charCodeAt(j % key.length) - 65;
        const p = (c - 65 - k + 26) % 26;
        plain += String.fromCharCode(p + 65);
        j++;
      } else {
        plain += cipher[i];
      }
    }
    return plain;
  }

  // Daily puzzles
  const puzzles = [
    { key: "VOID", hint: "Absence reveals truth.", answer: "NOTHING IS RANDOM EVERYTHING FITS" },
    { key: "ORBIT", hint: "Everything revolves.", answer: "LOGIC BENDS WHEN KEYS SHIFT" },
    { key: "SHADOW", hint: "Darkness hides repetition.", answer: "KNOWLEDGE HIDES IN PATTERNS" }, // Tuesday fixed
    { key: "NEBULA", hint: "Clarity emerges from chaos.", answer: "STRUCTURE EXISTS WITHIN NOISE" },
    { key: "MIRAGE", hint: "What you see may not be real.", answer: "PERCEPTION IS EASILY DECEIVED" },
    { key: "PHANTOM", hint: "The unseen influences all.", answer: "INVISIBLE SYSTEMS CONTROL ORDER" },
    { key: "ENIGMA", hint: "Machines once solved this.", answer: "DECODING REQUIRES TRUE PRECISION" }
  ];

  const todayIndex = new Date().getDay();
  const puzzle = puzzles[todayIndex];

  // Precompute ciphertext for each day
  const cipherText = vigenereEncrypt(puzzle.answer, puzzle.key);

  // Display
  document.getElementById("day").innerText = "Today's Key Hint: " + puzzle.hint;
  document.getElementById("cipher").innerText = cipherText;

  function checkAnswer() {
    const input = document.getElementById("answerInput").value.toUpperCase().replace(/\s/g,"");
    const decrypted = vigenereDecrypt(cipherText, puzzle.key).toUpperCase().replace(/\s/g,"");
    if (input === decrypted) {
      document.getElementById("result").innerText = `✅ Correct! Key: ${puzzle.key}`;
      document.getElementById("result").style.color = "lightgreen";
    } else {
      document.getElementById("result").innerText = "❌ Incorrect. Try again.";
      document.getElementById("result").style.color = "red";
    }
  }
</script>

</body>
</html>
