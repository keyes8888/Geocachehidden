<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Daily XOR Puzzle</title>
<style>
  body {
    font-family: Arial, sans-serif;
    background: #0f172a;
    color: white;
    text-align: center;
    padding: 40px;
  }
  .container { max-width: 600px; margin: auto; }
  .cipher-box {
    background: #1e293b;
    padding: 15px;
    margin: 20px 0;
    border-radius: 10px;
    word-break: break-all;
  }
  input {
    padding: 10px;
    width: 70%;
    margin-top: 10px;
  }
  button {
    padding: 10px 20px;
    margin-top: 10px;
    cursor: pointer;
  }
  #result { margin-top: 20px; font-weight: bold; }
</style>
</head>
<body>

<div class="container">
<h1>🔐 Daily XOR Puzzle</h1>
<p id="day"></p>
<div class="cipher-box">
  <p><strong>Ciphertext:</strong></p>
  <code id="cipher"></code>
</div>
<p id="hint"></p>
<input type="text" id="answerInput" placeholder="Enter decrypted text...">
<button onclick="checkAnswer()">Submit</button>
<p id="result"></p>
</div>

<script>
// Utility: convert string to byte array
function strToBytes(str) {
  return Array.from(str).map(c => c.charCodeAt(0));
}

// Utility: convert byte array to string
function bytesToStr(bytes) {
  return String.fromCharCode(...bytes);
}

// XOR two byte arrays
function xorBytes(a, b) {
  return a.map((val, idx) => val ^ b[idx]);
}

// Daily puzzles
const puzzles = [
  { answer: "NOTHING IS RANDOM EVERYTHING FITS", hint: "Absence reveals truth." },
  { answer: "LOGIC BENDS WHEN KEYS SHIFT", hint: "Everything revolves." },
  { answer: "KNOWLEDGE HIDES IN PATTERNS", hint: "Darkness hides repetition." }, // Tuesday fixed
  { answer: "STRUCTURE EXISTS WITHIN NOISE", hint: "Clarity emerges from chaos." },
  { answer: "PERCEPTION IS EASILY DECEIVED", hint: "What you see may not be real." },
  { answer: "INVISIBLE SYSTEMS CONTROL ORDER", hint: "The unseen influences all." },
  { answer: "DECODING REQUIRES TRUE PRECISION", hint: "Machines once solved this." }
];

// Determine today
const today = new Date().getDay();
const puzzle = puzzles[today];

// Precomputed key for each day
// key = ciphertext XOR answer (precomputed)
const keys = [
  [88,5,25,3,12,44,27, ...], // Example byte values for Sunday key
  [/* Monday key bytes */],
  [/* Tuesday key bytes */],
  [/* Wednesday key bytes */],
  [/* Thursday key bytes */],
  [/* Friday key bytes */],
  [/* Saturday key bytes */]
];

// For simplicity, we’ll generate a random fixed ciphertext of same length as longest answer
// and then precompute the keys in code for demonstration
const maxLen = Math.max(...puzzles.map(p=>p.answer.length));
const fixedCipherBytes = Array.from({length:maxLen},()=>Math.floor(Math.random()*26)+65);
const cipherText = bytesToStr(fixedCipherBytes);

// Generate keys dynamically from ciphertext XOR answer
function computeKey(cipher, answer) {
  const cipherBytes = strToBytes(cipher);
  const answerBytes = strToBytes(answer.toUpperCase().padEnd(cipherBytes.length," "));
  const keyBytes = xorBytes(cipherBytes, answerBytes);
  return keyBytes;
}

// Compute today’s key
const todayKeyBytes = computeKey(cipherText, puzzle.answer);

// Display
document.getElementById("day").innerText = "Today's Key Hint: " + puzzle.hint;
document.getElementById("cipher").innerText = cipherText;

// Check user input
function checkAnswer() {
  const input = document.getElementById("answerInput").value.toUpperCase().padEnd(fixedCipherBytes.length," ");
  const inputBytes = strToBytes(input);
  // Decrypt using XOR: plaintext = ciphertext XOR key
  const decryptedBytes = xorBytes(fixedCipherBytes, todayKeyBytes);
  const decryptedStr = bytesToStr(decryptedBytes).trim();
  if(input === decryptedStr) {
    document.getElementById("result").innerText = "✅ Correct!";
    document.getElementById("result").style.color = "lightgreen";
  } else {
    document.getElementById("result").innerText = "❌ Incorrect. Try again.";
    document.getElementById("result").style.color = "red";
  }
}
</script>

</body>
</html>
