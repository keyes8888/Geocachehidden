<!DOCTYPE html>
<html>
<head>
    <title>Daily Math Challenge</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            margin-top: 50px;
            background: #111;
            color: #eee;
        }
        .container {
            background: #222;
            padding: 40px;
            border-radius: 15px;
            display: inline-block;
        }
        input {
            padding: 10px;
            font-size: 16px;
            width: 120px;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            margin-left: 10px;
            cursor: pointer;
        }
        h1 { color: #00ffcc; }
        h2 { color: #ffcc00; font-size: 2em; } /* bigger text for password */
        #coordinates { 
            margin-top: 20px; 
            font-size: 1.5em; 
            color: #00ff99;
            font-weight: bold;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>Daily Math Challenge</h1>
    <p>Solve the equation to get today's password:</p>
    
    <h2 id="equation">Loading...</h2>
    
    <input type="text" id="userAnswer" placeholder="Your answer">
    <button onclick="checkAnswer()">Submit</button>
    
    <p id="feedback"></p>
    <h2 id="password" style="display:none;"></h2>

    <hr style="margin: 30px 0; border-color: #444;">
    
    <p>Enter today's password to reveal the hidden coordinates:</p>
    <input type="text" id="passwordInput" placeholder="Enter password">
    <button onclick="checkPassword()">Unlock</button>
    
    <p id="coordinates"></p>
</div>

<script>
// --- Daily Math Problem ---
function getDayOfYear() {
    const now = new Date();
    const start = new Date(now.getFullYear(), 0, 0);
    return Math.floor((now - start) / (1000*60*60*24));
}

// Daily problem: example formula
function getDailyProblem() {
    const day = getDayOfYear();
    const a = day + 5;
    const b = 3;
    const answer = a * b;
    const equationText = `${a} × ${b} = ?`;
    const password = `PASS-${day}`; // daily password
    return { equationText, answer, password };
}

const dailyProblem = getDailyProblem();
document.getElementById("equation").innerText = dailyProblem.equationText;

// --- Check Math Answer ---
function checkAnswer() {
    const userInput = parseInt(document.getElementById("userAnswer").value);
    const feedback = document.getElementById("feedback");
    const passwordEl = document.getElementById("password");

    if (userInput === dailyProblem.answer) {
        feedback.innerText = "Congratulations!";
        passwordEl.style.display = "block";
        passwordEl.innerText = `Today's password is: ${dailyProblem.password}`;
    } else {
        feedback.innerText = "You are invaluable";
        passwordEl.style.display = "none";
    }
}

// --- Check Password to Reveal Coordinates ---
function checkPassword() {
    const input = document.getElementById("passwordInput").value.trim();
    const coordsEl = document.getElementById("coordinates");

    if (input === dailyProblem.password) {
        coordsEl.innerText = "1-10-Patricks-hidden-place";
    } else {
        coordsEl.innerText = "Wrong password!";
    }
}
</script>
</body>
</html>
