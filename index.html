<!DOCTYPE html>
<html>
<head>
    <title>Daily Math Challenge</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            margin-top: 80px;
            background: #111;
            color: #eee;
        }
        .container {
            background: #222;
            padding: 40px;
            border-radius: 15px;
            display: inline-block;
        }
        input {
            padding: 10px;
            font-size: 16px;
            width: 100px;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            margin-left: 10px;
            cursor: pointer;
        }
        h2 { color: #00ffcc; }
    </style>
</head>
<body>
<div class="container">
    <h1>Daily Math Challenge</h1>
    <p>Solve the following equation to get today's password:</p>
    
    <h2 id="equation">Loading...</h2>
    
    <input type="text" id="userAnswer" placeholder="Your answer">
    <button onclick="checkAnswer()">Submit</button>
    
    <p id="feedback"></p>
    <p id="password" style="color: #ffcc00; font-weight: bold;"></p>
</div>

<script>
// Generate today's math problem
function getDayOfYear() {
    const now = new Date();
    const start = new Date(now.getFullYear(), 0, 0);
    return Math.floor((now - start) / (1000*60*60*24));
}

// Define daily problem: simple arithmetic
function getDailyProblem() {
    const day = getDayOfYear();
    // Example: equation = day * 7 + 3
    const a = day + 5;      // arbitrary formula for variety
    const b = 3;
    const answer = a * b;
    const equationText = `${a} × ${b} = ?`;
    return { equationText, answer };
}

// Display equation
const dailyProblem = getDailyProblem();
document.getElementById("equation").innerText = dailyProblem.equationText;

// Check user's answer
function checkAnswer() {
    const userInput = parseInt(document.getElementById("userAnswer").value);
    const feedback = document.getElementById("feedback");
    const passwordEl = document.getElementById("password");

    if (userInput === dailyProblem.answer) {
        feedback.innerText = "Congratulations!";
        passwordEl.innerText = `Today's password is: PASS-${getDayOfYear()}`;
    } else {
        feedback.innerText = "You are invaluable";
        passwordEl.innerText = "";
    }
}
</script>
</body>
</html>
