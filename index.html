<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Lorenz Cipher Geocache</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
<style>
/* --- General Page Styles --- */
body {
    font-family: 'Roboto', sans-serif;
    min-height: 100vh;
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
    color: #eee;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    overflow-x: hidden;
    padding: 40px 20px;
}
.container {
    background: #1c1c1c;
    border-radius: 25px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.6);
    width: 90%;
    max-width: 1000px;
    padding: 50px 60px;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    animation: fadeIn 1s ease;
}
h1 {
    color: #00ffcc;
    font-size: 3rem;
    font-weight: 700;
    margin-bottom: 40px;
    text-align: center;
    letter-spacing: 2px;
}
.section {
    background: #262626;
    border-radius: 20px;
    padding: 30px;
    margin-bottom: 30px;
    width: 100%;
    max-width: 900px;
    text-align: center;
    transition: transform 0.3s ease, background 0.3s ease, opacity 0.5s ease;
}
.section:hover { transform: translateY(-3px); background: #2d2d2d; }
.cipher {
    font-family: monospace;
    font-size: 1.8rem;
    background: #111;
    padding: 25px;
    border-radius: 20px;
    margin-bottom: 25px;
}
.input-container {
    display: flex;
    justify-content: center;
    align-items: center;
    flex-wrap: wrap;
    margin-top: 15px;
}
input[type=text] {
    padding: 14px 20px;
    font-size: 16px;
    border-radius: 12px;
    border: 1px solid #555;
    margin: 10px;
    width: 250px;
    transition: border 0.3s ease;
}
input[type=text]:focus { outline: none; border: 2px solid #00ffcc; }
button {
    padding: 14px 30px;
    font-size: 16px;
    border-radius: 12px;
    border: none;
    cursor: pointer;
    background: #00ffcc;
    color: #111;
    font-weight: 700;
    margin: 10px;
    transition: background 0.3s ease, transform 0.2s ease;
}
button:hover { background: #00ddbb; transform: translateY(-2px); }
#feedback {
    font-size: 1.3rem;
    font-weight: 700;
    margin-top: 20px;
    padding: 15px 25px;
    border-radius: 15px;
    display: inline-block;
    background: #333;
    color: #ffcc00;
    min-width: 300px;
    text-align: center;
    transition: all 0.3s ease;
}
#mathSection { opacity: 0; transform: translateX(100%); }
#mathSection.active { opacity: 1; transform: translateX(0); transition: transform 0.7s ease, opacity 0.7s ease; }
#mathPuzzle {
    font-size: 1.5rem;
    color: #ff77ff;
    font-weight: 600;
    margin-top: 15px;
    padding: 20px;
    border-radius: 15px;
    background: #2a1a2b;
    display: none;
    text-align: center;
}
#masterDisplay ul {
    list-style: none;
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 10px;
    margin-top: 15px;
}
#masterDisplay li {
    background: #ffbb55;
    color: #111;
    padding: 6px 12px;
    border-radius: 20px;
    font-weight: 700;
    font-size: 0.9rem;
    cursor: pointer;
    box-shadow: 0 3px 8px rgba(0,0,0,0.4);
    transition: transform 0.2s ease, background 0.3s ease;
}
#masterDisplay li:hover { transform: scale(1.1); background: #ffaa33; }
#coordinates {
    font-size: 2rem;
    font-weight: 700;
    margin-top: 25px;
    color: #00ff99;
    text-align: center;
}
@keyframes fadeIn { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
@media(max-width: 768px){ h1 { font-size: 2.2rem; } .cipher { font-size: 1.6rem; } input[type=text] { width: 200px; margin: 5px; } button { width: 100%; margin: 5px; } }
</style>
</head>
<body>
<div class="container">
<h1>Daily Lorenz Cipher Geocache</h1>

<div class="section">
<p><strong>Step 1:</strong> Decode today’s cipher:</p>
<div class="cipher" id="cipherDisplay"></div>
<div class="input-container">
<input type="text" id="cipherInput" placeholder="Enter decoded text">
<button onclick="checkCipher()">Submit</button>
</div>
</div>

<div class="section" id="mathSection">
<div id="mathPuzzle"></div>
<p><strong>Step 2:</strong> Enter the Step 1 password or solve the math puzzle:</p>
<div class="input-container">
<input type="text" id="passwordInput" placeholder="Enter password" disabled>
<button onclick="checkFinalPassword()">Unlock</button>
</div>
</div>

<div id="feedback"></div>
<div id="coordinates"></div>

<div id="masterDisplay">
<p>Earned Master Passwords:</p>
<ul id="masterList"></ul>
</div>
</div>

<script>
// --- Master passwords ---
const masterGlobal = "MARCUSPATRICK";
const masterCipherPassword = "CIPHERMASTER";
const masterMathPassword = "MATHMASTER";

let masterCipherEarned = false;
let masterMathEarned = false;
let currentMathAnswer = 0;

// --- Display earned passwords ---
function displayMasterPasswords(){
    const list = document.getElementById("masterList");
    list.innerHTML = "";
    if(masterCipherEarned) list.innerHTML += `<li onclick="autoFill('${masterCipherPassword}','cipher')">${masterCipherPassword} (Step 1)</li>`;
    if(masterMathEarned) list.innerHTML += `<li onclick="autoFill('${masterMathPassword}','final')">${masterMathPassword} (Step 2)</li>`;
}
function autoFill(password, step){
    if(step==='cipher') document.getElementById("cipherInput").value = password;
    if(step==='final') document.getElementById("passwordInput").value = password;
}

// --- Daily Lorenz Cipher ---
function pseudoRandom(seed){ let x=seed; return ()=>{ x=(x*1664525+1013904223)%4294967296; return x/4294967296; }; }
function getDailyKey(){
    const d = new Date(); return parseInt(`${d.getFullYear()}${(d.getMonth()+1).toString().padStart(2,'0')}${d.getDate().toString().padStart(2,'0')}`);
}
function lorenzCipher(text,key){ const rng=pseudoRandom(key); let out=''; for(let i=0;i<text.length;i++){ out+=String.fromCharCode(text.charCodeAt(i)^Math.floor(rng()*256)); } return out; }

const correctCipherPassword = "GEOCACHE";
const dailyKey = getDailyKey();
const cipherText = lorenzCipher(correctCipherPassword, dailyKey);
document.getElementById("cipherDisplay").innerText = cipherText.split('').map(c=>c.charCodeAt(0)).join(' ');

// --- Math puzzle ---
function generateMathPuzzle(){
    const a=Math.floor(Math.random()*50)+1;
    const b=Math.floor(Math.random()*50)+1;
    const op=Math.random()<0.5?'+':'-';
    currentMathAnswer = op==='+'? a+b : a-b;
    document.getElementById("mathPuzzle").innerText=`Solve this: ${a} ${op} ${b} = ?`;
}
setInterval(()=>{ if(document.getElementById("mathSection").classList.contains("active")) generateMathPuzzle(); },60000);

// --- Step 1 check ---
function checkCipher(){
    const input=document.getElementById("cipherInput").value.trim().toUpperCase();
    const feedback=document.getElementById("feedback");
    const finalInput=document.getElementById("passwordInput");
    const mathSection=document.getElementById("mathSection");

    if([correctCipherPassword, masterGlobal, masterCipherPassword].includes(input) || masterCipherEarned){
        feedback.innerText="Cipher correct! Solve the math puzzle or use the revealed password.";
        finalInput.disabled=false;
        document.getElementById("mathPuzzle").style.display="block";
        mathSection.classList.add("active");
        generateMathPuzzle();
        if(!masterCipherEarned){ masterCipherEarned=true; displayMasterPasswords(); }
    } else {
        feedback.innerText="YOU HAVE GOT IT WRONG";
        finalInput.disabled=true;
        mathSection.classList.remove("active");
        document.getElementById("mathPuzzle").style.display="none";
        document.getElementById("coordinates").innerText="";
    }
}

// --- Step 2 check ---
const finalCoordinates = "1-2-3-4-Marcus-Patrick-x-10";
function checkFinalPassword(){
    const cipherInput=document.getElementById("cipherInput").value.trim().toUpperCase();
    const input=document.getElementById("passwordInput").value.trim().toUpperCase();
    const feedback=document.getElementById("feedback");
    const coords=document.getElementById("coordinates");

    if(input===masterGlobal){
        feedback.innerText="Congratulations!";
        coords.innerText=finalCoordinates;
        masterMathEarned=true;
        displayMasterPasswords();
        return;
    }

    const step1Valid=[correctCipherPassword, masterCipherPassword].includes(cipherInput) || masterCipherEarned;
    if(step1Valid){
        if([correctCipherPassword, masterMathPassword].includes(input) || parseInt(input)===currentMathAnswer || masterMathEarned){
            feedback.innerText="Congratulations!";
            coords.innerText=finalCoordinates;
            if(!masterMathEarned){ masterMathEarned=true; displayMasterPasswords(); }
        } else {
            feedback.innerText="YOU HAVE GOT IT WRONG";
            coords.innerText="";
        }
    } else {
        feedback.innerText="YOU HAVE GOT IT WRONG";
        coords.innerText="";
    }
}
</script>
</body>
</html>
